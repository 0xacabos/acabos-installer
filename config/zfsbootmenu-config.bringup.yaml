# Diagnostic bring-up profile for ZFSBootMenu.
# Temporary profile: use only during initramfs stall triage.
Global:
  ManageImages: true
  BootMountPoint: /boot/efi
  DracutConfDir: /etc/zfsbootmenu/dracut.conf.d

Components:
  Enabled: true
  ImageDir: /boot/efi/EFI/zbm
  Versions: false

EFI:
  Enabled: true
  ImageDir: /boot/efi/EFI/zbm
  Versions: false

Kernel:
  Prefix: zfsbootmenu
  CommandLine: "rd.debug loglevel=7 rd.shell rd.break=pre-mount panic=10 console=tty0 zbm.show zbm.timeout=10"
