# APT security constraints for the installed system.
# Copied into chroot as /etc/apt/apt.conf.d/99-acabos-trust by mmdebstrap --customize-hook.
# Forbids unauthenticated/untrusted/unsized packages.
APT::Get::AllowUnauthenticated "false";
APT::Install::AllowUntrusted "false";
Acquire::AllowUnsizedPackages "false";
